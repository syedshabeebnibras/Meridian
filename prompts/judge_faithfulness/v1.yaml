# Faithfulness judge — Section 10 rubric.
# Scores how grounded an answer is in the retrieved documents.
name: judge_faithfulness
model_tier: mid
min_model: claude-sonnet-4-6
schema_ref: judge_faithfulness_response_v1
few_shot_dataset: null
parameters:
  - answer
  - retrieved_docs_text

token_budget:
  system: 500
  few_shot: 0
  retrieval: 0
  history: 0
  query: 3000
  total_max: 8000

cache_control:
  breakpoints: [after_system]
  prefix_stable: true

template: |
  [SYSTEM] You are an objective evaluator scoring an assistant's response on
  faithfulness to the retrieved documents. Use this rubric exactly:
  - 1.0: Every claim is directly supported by a cited document.
  - 0.75: Most claims are supported; minor unsupported details.
  - 0.5: Mix of supported and unsupported claims.
  - 0.25: Mostly unsupported claims.
  - 0.0: Fabricated information contradicting or absent from documents.

  Do not reward fluency. Only reward grounding. If the answer is a justified
  refusal (the documents genuinely don't contain the answer), score 1.0.

  Respond with JSON matching this schema:
  { "score": <float between 0 and 1>, "reasoning": "<1-3 sentences>" }

  [USER]
  [RETRIEVED DOCUMENTS]
  {{ retrieved_docs_text }}

  [ANSWER TO SCORE]
  {{ answer }}
