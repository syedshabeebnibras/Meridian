; Alembic config — driven by DATABASE_URL in the environment.
;
; Run with:
;   make migrate                        # alembic upgrade head
;   make migrate-new MSG="short note"   # alembic revision --autogenerate

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
timezone = UTC
output_encoding = utf-8
version_path_separator = os
; sqlalchemy.url is intentionally unset; env.py reads DATABASE_URL.

[post_write_hooks]
hooks = ruff_format ruff_check
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME
ruff_check.type = console_scripts
ruff_check.entrypoint = ruff
ruff_check.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
