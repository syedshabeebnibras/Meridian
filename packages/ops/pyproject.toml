[project]
name = "meridian-ops"
version = "0.1.0"
description = "Operational primitives — rate limiter + error taxonomy (Section 11)."
requires-python = ">=3.12"
dependencies = [
    "meridian-contracts",
    "redis>=5.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/meridian_ops"]
