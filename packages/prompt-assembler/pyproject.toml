[project]
name = "meridian-prompt-assembler"
version = "0.1.0"
description = "Renders prompt templates, budgets tokens, and emits cache breakpoints (Section 6)."
requires-python = ">=3.12"
dependencies = [
    "meridian-contracts",
    "jinja2>=3.1.4",
    "tiktoken>=0.9.0",
    "pydantic>=2.10.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/meridian_prompt_assembler"]
