[project]
name = "meridian-ingestion"
version = "0.1.0"
description = "Local document ingestion + tenant-scoped pgvector retrieval (Phase 6)."
requires-python = ">=3.12"
dependencies = [
    "meridian-contracts",
    "meridian-db",
    "meridian-semantic-cache",
    "pgvector>=0.3.6",
    "pydantic>=2.10.0",
    "pypdf>=5.0",
    "sqlalchemy>=2.0.36",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/meridian_ingestion"]
