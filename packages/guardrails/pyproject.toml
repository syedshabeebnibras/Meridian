[project]
name = "meridian-guardrails"
version = "0.1.0"
description = "Guardrail pipeline interface (implementations land in Phase 5)."
requires-python = ">=3.12"
dependencies = [
    "meridian-contracts",
    "httpx>=0.28.0",
    "pydantic>=2.10.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/meridian_guardrails"]
