[project]
name = "meridian-feature-flags"
version = "0.1.0"
description = "Percentage-based rollout + per-user allowlist + kill switch (Section 12 Phase 8)."
requires-python = ">=3.12"
dependencies = [
    "meridian-contracts",
    "sqlalchemy>=2.0.36",
    "pydantic>=2.10.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/meridian_feature_flags"]
