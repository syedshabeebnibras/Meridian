[project]
name = "meridian-output-validator"
version = "0.1.0"
description = "Validates model outputs — schema, citations, refusals, length (Section 7)."
requires-python = ">=3.12"
dependencies = [
    "meridian-contracts",
    "jsonschema>=4.23.0",
    "pydantic>=2.10.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/meridian_output_validator"]
