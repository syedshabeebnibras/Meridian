[project]
name = "meridian-contracts"
version = "0.1.0"
description = "Meridian shared data contracts (Section 8 of the execution plan)."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.10.0",
    "email-validator>=2.2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/meridian_contracts"]
