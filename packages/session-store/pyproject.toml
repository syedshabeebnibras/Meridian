[project]
name = "meridian-session-store"
version = "0.1.0"
description = "Per-session conversation memory — in-memory + Redis implementations."
requires-python = ">=3.12"
dependencies = [
    "meridian-contracts",
    "redis>=5.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/meridian_session_store"]
