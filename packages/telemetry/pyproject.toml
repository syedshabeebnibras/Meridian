[project]
name = "meridian-telemetry"
version = "0.1.0"
description = "OpenTelemetry setup + GenAI semantic conventions for Meridian."
requires-python = ">=3.12"
dependencies = [
    "meridian-contracts",
    "opentelemetry-api>=1.29.0",
    "opentelemetry-sdk>=1.29.0",
    "opentelemetry-exporter-otlp>=1.29.0",
    "langfuse>=2.60.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/meridian_telemetry"]
