  - input: "What's the cap on consulting hours in the Pro tier?"
    retrieved_docs:
      - title: "Pro Tier Contract Template"
        url: "https://wiki.example.com/pro-contract"
        content: "Pro tier includes 20 consulting hours per quarter, with additional hours billed at $250/hr."
        relevance: 0.98
    golden_answer: "20 consulting hours per quarter."
    expected_citations:
      - "Pro Tier Contract Template"
    stub_response:
      content:
        reasoning: "DOC-1 states the cap explicitly."
        answer: "The Pro tier includes 20 consulting hours per quarter; additional hours are billed at $250/hr [DOC-1]."
        citations:
          - doc_index: 1
            source_title: "Pro Tier Contract Template"
            relevant_excerpt: "20 consulting hours per quarter"
        confidence: 0.95
        needs_escalation: false

